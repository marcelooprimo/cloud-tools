# O Linux mint não tem suporte a snap
# e para instalar é preciso remover
# o arquivo nosnap que está em preferences.d
- name: Backup of nosnap file
  ignore_errors: true
  become: true
  copy:
    src: /etc/apt/preferences.d/nosnap.pref
    dest: ~/nosnap.backup
    mode: 0644
  when: ansible_distribution == 'Linux Mint'

- name: Removing nosnap file
  ignore_errors: true
  become: true
  file:
    path: /etc/apt/preferences.d/nosnap.pref
    state: absent
  when: ansible_distribution == 'Linux Mint'

- name: Update all packages to their latest version (apt)
  become: true
  apt:
    name: "*"
    update_cache: true
    cache_valid_time: 3600
    state: latest
  when: ansible_os_family == "Debian" and os_upgrade == "yes"

- name: Upgrade OS packages (apt)
  become: true
  apt:
    upgrade: dist
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian" and os_upgrade == "yes"

- name: Install OS packages (apt)
  become: true
  apt:
    update_cache: true
    cache_valid_time: 3600
    install_recommends: true
    state: present
    pkg: "{{ os_packages }}"
  when: ansible_os_family == "Debian"

# Opensuse support

- name: Update all openSUSE Leap packages to their latest version
  become: true
  community.general.zypper:
    name: "*"
    update_cache: true
    state: latest
  when: ansible_os_family == "Suse" and os_upgrade == "yes"

- name: Perform openSUSE Leap dist-upgrade
  become: true
  community.general.zypper:
    name: "*"
    state: dist-upgrade
  when: ansible_os_family == "Suse" and os_upgrade == "yes"

- name: Install OS packages openSUSE Leap
  become: true
  community.general.zypper:
    disable_recommends: false
    state: present
    pkg: "{{ os_packages }}"
  when: ansible_os_family == "Suse"
