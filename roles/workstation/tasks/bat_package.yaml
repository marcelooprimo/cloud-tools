# bat app (nos repos noble/trixie o pacote é "bat" e o binário chama batcat)
- name: Installing bat package (apt)
  become: true
  apt:
    name: bat
    state: present
  when: ansible_os_family == "Debian"

- name: Check batcat binary
  stat:
    path: /usr/bin/batcat
  register: batcat_bin
  when: ansible_os_family == "Debian"

- name: Create bat symlink for batcat
  become: true
  file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  when: ansible_os_family == "Debian" and batcat_bin.stat.exists

- name: Install bat packages on openSUSE
  become: true
  community.general.zypper:
    update_cache: true
    disable_recommends: false
    state: present
    pkg:
      - bat
      - bat-bash-completion
      - bat-zsh-completion
  when: ansible_os_family == "Suse"

# add alias in bashrc or zshrc
- name: Check if bashrc exists
  stat:
    path: "{{ home_user }}/.bashrc"
  register: bashrc

- name: Append bat alias at .bashrc file
  lineinfile:
    path: "{{ home_user }}/.bashrc"
    line: "alias bat='bat --theme ansi'"
    state: present
  when: bashrc.stat.exists

- name: Check if zshrc exists
  stat:
    path: "{{ home_user }}/.zshrc"
  register: zshrc

- name: Append bat alias at .zshrc file
  lineinfile:
    path: "{{ home_user }}/.zshrc"
    line: "alias bat='bat --theme ansi'"
    state: present
  when: zshrc.stat.exists
