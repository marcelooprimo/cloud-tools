# Cria diretorio git
- name: Creating git directory
  file:
    path: "{{ home_user }}/git"
    state: directory
    mode: "0755"

# Copia o script que fará
# as atualizações do repositório
- name: Copy script to update git dir repo
  copy:
    src: "{{ role_path }}/files/sync_git.sh"
    dest: "{{ home_user }}"
    mode: "0775"

# Adiciona todas modificações
# da variavel $PATH do sistema
- name: Check if bashrc exists
  stat:
    path: "{{ home_user }}/.bashrc"
  register: bashrc

- name: Remove legacy PATH lines from .bashrc
  lineinfile:
    path: "{{ home_user }}/.bashrc"
    regexp: '^export PATH="\$PATH:.*(\.asdf|mise/shims).*"$'
    state: absent
  when: bashrc.stat.exists

- name: Ensure app PATH line at .bashrc file
  lineinfile:
    path: "{{ home_user }}/.bashrc"
    regexp: '^export PATH="\$HOME/\.local/share/mise/shims:'
    line: "{{ app_path }}"
    state: present
  when: bashrc.stat.exists

- name: Check if zshrc exists
  stat:
    path: "{{ home_user }}/.zshrc"
  register: zshrc

- name: Remove legacy PATH lines from .zshrc
  lineinfile:
    path: "{{ home_user }}/.zshrc"
    regexp: '^export PATH="\$PATH:.*(\.asdf|mise/shims).*"$'
    state: absent
  when: zshrc.stat.exists

- name: Ensure app PATH line at .zshrc file
  lineinfile:
    path: "{{ home_user }}/.zshrc"
    regexp: '^export PATH="\$HOME/\.local/share/mise/shims:'
    line: "{{ app_path }}"
    state: present
  when: zshrc.stat.exists

# Adiciona os aliases customizados
# caso não estejam no arquivo
- name: Checking custom aliases in bashrc
  lineinfile:
    path: "{{ home_user }}/.bashrc"
    line: "# Custom Aliases"
  check_mode: true
  register: bash_alias

- name: Checking custom aliases in zshrc
  lineinfile:
    path: "{{ home_user }}/.zshrc"
    line: "# Custom Aliases"
  check_mode: true
  register: zsh_alias
  when: zshrc.stat.exists

- name: Append custom aliases at .bashrc file
  shell:
    cmd: "cat {{ role_path }}/files/aliases >> ~/.bashrc"
  when: bashrc.stat.exists and bash_alias.changed

- name: Append custom aliases at .zshrc file
  shell:
    cmd: "cat {{ role_path }}/files/aliases >> ~/.zshrc"
  when: zshrc.stat.exists and zsh_alias.changed

# Shellcheck (migração p/ mise prevista na fase 2 do plano de melhoria)
- name: Installing Shellchek
  become: true
  shell:
    cmd: "{{ role_path }}/files/shellcheck_install.sh"
    creates: /usr/bin/shellcheck

# SOPS (migração p/ mise prevista na fase 2 do plano de melhoria)
- name: Installing SOPS
  become: true
  shell:
    cmd: "{{ role_path }}/files/sops_install.sh"
    creates: /usr/local/bin/sops

# Postman via snapd (falha esperada em containers sem systemd)
- name: Installing Postman
  become: true
  shell:
    cmd: "snap install postman"
  register: postman_result
  failed_when: false
  changed_when: "postman_result.rc == 0 and 'already installed' not in postman_result.stderr"
  when: ansible_os_family == "Debian"

# openSUSE
- name: Download Postman
  become: true
  get_url:
    url: "https://dl.pstmn.io/download/latest/linux_64"
    dest: "/tmp/postman.tar.gz"
    mode: "0755"
  when: ansible_os_family == "Suse"

- name: Extract Postman
  become: true
  unarchive:
    src: "/tmp/postman.tar.gz"
    dest: "/opt/"
  when: ansible_os_family == "Suse"

- name: Creating Postman Symlink
  become: true
  file:
    src: "/opt/Postman/app/Postman"
    dest: "/usr/bin/postman"
    state: link
  when: ansible_os_family == "Suse"
