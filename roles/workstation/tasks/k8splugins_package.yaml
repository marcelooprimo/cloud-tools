# Exporta o $PATH e Instala kubectl tree (tolera plugin já instalado)
- name: Installing kubectl tree plugin
  shell:
    cmd: "{{ app_path }} && kubectl krew install tree"
  register: krew_tree_result
  failed_when: krew_tree_result.rc != 0 and 'already installed' not in krew_tree_result.stderr

# Exporta o $PATH e Instala node-shell (tolera plugin já instalado)
- name: Installing node-shell plugin
  shell:
    cmd: "{{ app_path }} && kubectl krew install node-shell"
  register: krew_nodeshell_result
  failed_when: krew_nodeshell_result.rc != 0 and 'already installed' not in krew_nodeshell_result.stderr

# Instala o kubefwd
- name: Installing kubefwd on Ubuntu/Linux Mint/Pop_OS
  become: true
  apt:
    deb: https://github.com/txn2/kubefwd/releases/download/v{{ kubefwd_version }}/kubefwd_amd64.deb
  when: ansible_os_family == "Debian"

- name: Installing kubefwd on openSUSE
  become: true
  community.general.zypper:
    name: https://github.com/txn2/kubefwd/releases/download/v{{ kubefwd_version }}/kubefwd_amd64.rpm
    disable_gpg_check: true
  when: ansible_os_family == "Suse"

# Instala kubepug
- name: Installing kubepug
  become: true
  unarchive:
    src: "https://github.com/kubepug/kubepug/releases/download/{{ kubepug_version }}/kubepug_linux_amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true

# Instala kubent (git.io foi desativado pelo GitHub; download direto da release)
- name: Installing kubent
  become: true
  unarchive:
    src: "https://github.com/doitintl/kube-no-trouble/releases/download/{{ kubent_version }}/kubent-{{ kubent_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
