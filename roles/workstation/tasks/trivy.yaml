- name: Add Trivy Key on Ubuntu/Linux Mint
  become: true
  get_url:
    url: https://aquasecurity.github.io/trivy-repo/deb/public.key
    dest: /usr/share/keyrings/trivy.asc
    mode: "0644"
  when: trivy_install == 'yes' and ansible_os_family == "Debian"

# cria o arquivo trivy.list no diretório /etc/apt/sources.list.d/
- name: Add Trivy repository on Ubuntu/Linux Mint
  become: true
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/trivy.asc] https://aquasecurity.github.io/trivy-repo/deb generic main"
    state: present
    filename: trivy.list
  when: trivy_install == 'yes' and ansible_os_family == "Debian"

# Instala o trivy
- name: Install Trivy tool on Ubuntu/Linux Mint
  become: true
  apt:
    update_cache: true
    name: "trivy"
    state: latest
  when: trivy_install == 'yes' and ansible_os_family == "Debian"

# openSUSE
- name: Install Trivy tool on openSUSE via mise
  shell:
    cmd: "mise use --global trivy@latest"
  environment:
    PATH: "{{ home_user }}/.local/bin:{{ ansible_env.PATH }}"
  when: trivy_install == 'yes' and ansible_os_family == "Suse"
