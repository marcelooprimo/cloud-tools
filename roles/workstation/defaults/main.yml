---
# defaults file for role workstation
# PATH final com todos apps instalados
app_path: 'export PATH="$PATH:${KREW_ROOT:-$HOME/.krew}/bin:/opt/kubectx:$HOME/.local/share/mise/shims"'

# Atualiza todos os pacotes do S.O. no início ("no" acelera testes em container)
os_upgrade: "yes"

# AWS modo de instalação, opção pip ou apt
awscli_install_mode: "pip"

# Versão do AWS CLI - opção v1 ou v2
awscli_version: "v2"

# AWS IAM VERSION
iam_auth_version: "0.7.1"

# Home do Usuario
home_user: "/home/{{ ansible_user_id }}"

# Helm (sem pin de versão: o baltocdn remove builds antigas do repo)
helm_package: "helm"

# Helm Diff version
helm_diff: "v3.11.0"

# Helm Secrets version
helm_secrets: "v4.6.3"

# JJ
jj_install: "no"
jj_version: "1.9.2"

# Krew
krew_package: "krew-linux_amd64"

# KubeFWD
kubefwd_version: "1.22.5"

# Kubepug
kubepug_version: "v1.7.1"

# Kubent (kube-no-trouble)
kubent_version: "0.7.3"

# mise (gerenciador de versões — substitui asdf/tfenv/tgenv/nvm)
mise_install: "yes"
golang_version: "1.24.2"
kubectl_version: "latest"
node_version: "lts"
terraform_version: "1.5.7"
terragrunt_version: "0.55.20"

# Trivy
trivy_install: "yes"

# VSCode
install_vscode_plugins: "yes"

# ZSH
powerlevel10k: "yes"
powerlevel10k_default: "yes"
zsh_install: "yes"
